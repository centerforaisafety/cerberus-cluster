---
- name: Disable swap for current session
  command: swapoff -a
  become: true

- name: Disable swap permanently, persist reboots
  replace:
    path: /etc/fstab
    regexp: '^(\s*)([^#\n]+\s+)(\w+\s+)swap(\s+.*)$'
    replace: '#\1\2\3swap\4'
    backup: yes

- name: Install packages
  vars:
    package_name:
      - zsh
      - git
      - git-lfs
      - fish
      - neovim
      - zip
    package_state: latest
  include_role:
    name: safe_yum
  ignore_errors: true

- name: Install tmp cleanup helper
  become: true
  copy:
    src: tmp-duster.sh
    dest: /usr/local/sbin/tmp-duster.sh
    owner: root
    group: root
    mode: '0755'
  become: true

- name: Ensure tmp cleanup runs hourly
  become: true
  cron:
    name: tmp directory cleanup
    special_time: hourly
    user: ubuntu
    job: "/usr/local/sbin/tmp-duster.sh"
  become: true

- name: Install new healthchecks
  become: true
  block:
    - name: Ensure healthchecks directory exists
      file:
        path: /opt/oci-hpc/healthchecks
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Copy healthcheck scripts
      copy:
        src: "{{ item }}"
        dest: "/opt/oci-hpc/healthchecks/{{ item }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
      loop:
        - check_gpu_setup.py
        - xid_checker.py
  
